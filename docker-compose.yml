services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "api:app",
        "--app-dir",
        "src/backend",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./.vanguard:/app/.vanguard
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  langgraph:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    command:
      [
        "uv",
        "run",
        "langgraph",
        "dev",
        "--allow-blocking",
        "--host",
        "0.0.0.0",
        "--port",
        "2024",
      ]
    ports:
      - "2024:2024"
    volumes:
      - ./.vanguard:/app/.vanguard

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://langgraph:2024
    ports:
      - "5173:5173"
    depends_on:
      fastapi:
        condition: service_healthy
      langgraph:
        condition: service_started
